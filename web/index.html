<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMAPC — P2P Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;
  --accent:#6c63ff;--accent2:#e94560;--green:#4caf50;
  --text:#e8e8e8;--muted:#7a7a9e;
  --radius:12px;--bubble-self:#2d2b55;--bubble-other:#16213e;--bubble-ai:#1b2a1b;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}

/* ── Shared ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field textarea,.field select{
  width:100%;padding:10px 12px;background:var(--bg);border:1px solid #ffffff15;border-radius:8px;
  color:var(--text);font-size:14px;outline:none;transition:border .2s;resize:vertical
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field select option{background:var(--bg)}
.hidden{display:none!important}

/* ═══════════ SETUP VIEW ═══════════ */
#view-setup{display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:40px 20px}
#setup-container{width:100%;max-width:640px}
#setup-container h1{font-size:28px;font-weight:700;text-align:center;margin-bottom:6px}
#setup-container .subtitle{text-align:center;color:var(--muted);font-size:14px;margin-bottom:32px}
.card{background:var(--surface);border-radius:var(--radius);padding:24px;margin-bottom:20px;border:1px solid #ffffff08}
.card h2{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:16px;font-weight:600}
.row{display:flex;gap:14px}
.row>.field{flex:1}
.range-row{display:flex;align-items:center;gap:12px}
.range-row input[type=range]{flex:1;accent-color:var(--accent)}
.range-row .val{font-size:14px;color:var(--accent);min-width:60px;text-align:right}

/* Ollama status */
.status-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
.status-dot.on{background:var(--green)}.status-dot.off{background:var(--accent2)}

/* Model list */
.model-list{margin-top:12px}
.model-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg);border-radius:8px;margin-bottom:8px;font-size:13px}
.model-item .name{font-weight:600;flex:1}
.model-item .meta{color:var(--muted);margin:0 12px;font-size:12px}
.model-item button{padding:6px 14px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .2s}
.model-item button:hover{opacity:.85}
.btn-download{background:var(--accent);color:#fff}
.btn-installed{background:#ffffff10;color:var(--green);cursor:default}
.btn-delete{background:#ffffff10;color:var(--accent2)}
.progress-bar{height:4px;background:#ffffff10;border-radius:2px;margin-top:8px;overflow:hidden;display:none}
.progress-bar .fill{height:100%;background:var(--accent);transition:width .3s;width:0}
#pull-status{font-size:12px;color:var(--muted);margin-top:6px;min-height:18px}

/* Join button */
#btn-join{
  display:block;width:100%;padding:16px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;
  transition:opacity .2s;margin-top:8px
}
#btn-join:hover{opacity:.85}
#btn-join:disabled{opacity:.4;cursor:default}

/* ═══════════ CHAT VIEW ═══════════ */
#view-chat{display:none;height:100vh}
#app{display:flex;height:100%;overflow:hidden}
#sidebar{width:300px;background:var(--surface);border-right:1px solid #ffffff10;display:flex;flex-direction:column;transition:margin .3s;flex-shrink:0;overflow-y:auto}
#sidebar.hidden{margin-left:-300px}
#sidebar header{padding:20px;border-bottom:1px solid #ffffff10}
#sidebar header h2{font-size:14px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:16px}
#sidebar .section-title{padding:16px 20px 8px;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:600}
#sidebar .section-body{padding:0 20px 12px}
#btn-force-reply{
  margin:12px 20px;padding:12px;background:var(--accent2);color:#fff;border:none;border-radius:8px;
  font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;text-align:center
}
#btn-force-reply:hover{opacity:.85}
#sidebar footer{margin-top:auto;padding:16px 20px;border-top:1px solid #ffffff10;font-size:12px;color:var(--muted)}
#peer-count{color:var(--accent)}
.memory-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #ffffff08;font-size:12px;line-height:1.4}
.memory-item .fact{flex:1;color:var(--text)}
.memory-item button{background:none;border:none;color:var(--accent2);cursor:pointer;font-size:14px;padding:2px 4px;flex-shrink:0}

#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--surface);border-bottom:1px solid #ffffff10}
#btn-toggle{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px}
#btn-toggle:hover{background:#ffffff10}
#topbar h1{font-size:16px;font-weight:600}
#topbar .spacer{flex:1}
#status{font-size:12px;color:var(--muted)}
#room-badge{font-size:12px;background:var(--accent);color:#fff;padding:3px 10px;border-radius:12px}

#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:6px}
#chat::-webkit-scrollbar{width:6px}
#chat::-webkit-scrollbar-thumb{background:#ffffff20;border-radius:3px}
.msg{display:flex;flex-direction:column;max-width:70%;animation:fadeIn .25s ease}
.msg.self{align-self:flex-end;align-items:flex-end}
.msg.other{align-self:flex-start;align-items:flex-start}
.msg.system{align-self:center;max-width:90%}
.msg .meta{font-size:11px;color:var(--muted);margin-bottom:3px;padding:0 6px}
.msg .bubble{padding:10px 14px;border-radius:var(--radius);font-size:14px;line-height:1.5;word-break:break-word}
.msg.self .bubble{background:var(--bubble-self);border-bottom-right-radius:4px}
.msg.other .bubble{background:var(--bubble-other);border-bottom-left-radius:4px}
.msg.ai .bubble{background:var(--bubble-ai);border-left:3px solid var(--green)}
.msg.system .bubble{background:transparent;color:var(--muted);font-size:12px;text-align:center;padding:6px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

#input-bar{display:flex;align-items:center;gap:10px;padding:14px 20px;background:var(--surface);border-top:1px solid #ffffff10}
#msg-input{flex:1;padding:12px 16px;background:var(--bg);border:1px solid #ffffff15;border-radius:24px;color:var(--text);font-size:14px;outline:none;transition:border .2s}
#msg-input:focus{border-color:var(--accent)}
#btn-send{padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
#btn-send:hover{opacity:.85}
#btn-send:disabled{opacity:.4;cursor:default}
@media(max-width:768px){
  #sidebar{position:fixed;z-index:10;height:100%;box-shadow:4px 0 24px #00000080}
  #sidebar.hidden{margin-left:-300px}
}
</style>
</head>
<body>

<!-- ═══════════ SETUP VIEW ═══════════ -->
<div id="view-setup">
  <div id="setup-container">
    <h1>DMAPC</h1>
    <p class="subtitle">Distributed Multi-Agent P2P Chat System</p>

    <div class="card">
      <h2>Your Profile</h2>
      <div class="row">
        <div class="field"><label>Display Name</label><input id="s-name" type="text" placeholder="Enter your name..." maxlength="30"></div>
        <div class="field"><label>Room Code</label><input id="s-room" type="text" placeholder="e.g. study-group-42" maxlength="40"></div>
      </div>
    </div>

    <div class="card">
      <h2>AI Model</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px">
        <span class="status-dot" id="ollama-dot"></span>
        Ollama: <span id="ollama-status">checking...</span>
      </p>
      <div id="model-section">
        <div id="installed-list"></div>
        <h3 style="font-size:12px;color:var(--muted);margin:16px 0 8px;text-transform:uppercase;letter-spacing:1px">Recommended Models</h3>
        <div id="recommended-list"></div>
        <div class="progress-bar" id="pull-progress"><div class="fill" id="pull-fill"></div></div>
        <div id="pull-status"></div>
      </div>
    </div>

    <div class="card">
      <h2>AI Persona</h2>
      <div class="row">
        <div class="field"><label>AI Name</label><input id="s-ai-name" type="text" placeholder="e.g. Jarvis" maxlength="30"></div>
        <div class="field">
          <label>Model</label>
          <select id="s-ai-model"><option value="">— select after install —</option></select>
        </div>
      </div>
      <div class="field"><label>Personality</label><textarea id="s-ai-style" rows="2" placeholder="e.g. Sarcastic but helpful, loves sports..."></textarea></div>
      <div class="field">
        <label>Memory Limit</label>
        <div class="range-row"><input type="range" id="s-mem-limit" min="10" max="200" value="50"><span class="val" id="s-mem-val">50 facts</span></div>
      </div>
      <div class="field">
        <label>Context Window (num_ctx)</label>
        <div class="range-row"><input type="range" id="s-num-ctx" min="512" max="8192" step="512" value="4096"><span class="val" id="s-ctx-val">4096</span></div>
      </div>
    </div>

    <button id="btn-join" disabled>Join Room</button>
  </div>
</div>

<!-- ═══════════ CHAT VIEW ═══════════ -->
<div id="view-chat">
  <div id="app">
    <aside id="sidebar">
      <header>
        <h2>Chat Info</h2>
        <div style="font-size:13px;color:var(--muted)">Room: <span id="chat-room" style="color:var(--accent)"></span></div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px">You: <span id="chat-name" style="color:var(--text)"></span></div>
      </header>
      <div class="section-title">AI Persona</div>
      <div class="section-body">
        <div class="field"><label>AI Name</label><input id="ai-name" type="text" maxlength="30"></div>
        <div class="field"><label>Personality</label><textarea id="ai-style" rows="2"></textarea></div>
        <div class="field"><label>Model</label><select id="ai-model"></select></div>
      </div>
      <button id="btn-force-reply">Force Reply</button>
      <div class="section-title">AI Memories</div>
      <div class="section-body" id="memory-list" style="max-height:200px;overflow-y:auto"></div>
      <footer>Peers connected: <span id="peer-count">0</span></footer>
    </aside>
    <section id="main">
      <div id="topbar">
        <button id="btn-toggle" title="Toggle sidebar">☰</button>
        <h1>DMAPC Chat</h1>
        <div class="spacer"></div>
        <span id="room-badge"></span>
        <span id="status">Connecting...</span>
      </div>
      <div id="chat"></div>
      <div id="input-bar">
        <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off" disabled>
        <button id="btn-send" disabled>Send</button>
      </div>
    </section>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
